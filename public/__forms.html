<!doctype html>
<html>
  <head>
    <title>Netlify form detection</title>
  </head>
  <body>
    <!-- This hidden form exists only so Netlify registers the "contact" form
         at deploy time. The real, interactive form lives at /contact/ and
         posts here by matching form-name. Field names must match. -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="where" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
